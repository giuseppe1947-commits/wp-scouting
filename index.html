<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WP ULTRA SCOUTING</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {font-family: Arial; background:#0f172a; color:white; text-align:center;}
button {padding:15px;margin:5px;border-radius:10px;border:none;font-size:18px;}
.player {padding:10px;margin:5px;border-radius:8px;background:#1e293b;}
.selected {background:#2ecc71;}
.box {background:#1e293b;padding:10px;margin:10px;border-radius:10px;}
.green{background:#2ecc71;} .red{background:#e74c3c;} .blue{background:#3498db;}
</style>
</head>

<body>

<h2>🏊 WP ULTRA SCOUTING</h2>

<div class="box">
<input id="teamName" placeholder="Squadra">
<input id="coachName" placeholder="Allenatore">
<button onclick="salva()">Salva</button>
</div>

<div class="box">
<h3>⏱ Tempo: <span id="tempo">00:00</span></h3>
<h3>Periodo: <span id="periodo">1</span></h3>
<button onclick="start()">START</button>
<button onclick="stop()">STOP</button>
<button onclick="reset()">RESET</button>
<button onclick="nextPeriodo()">NEXT</button>
</div>

<div class="box" id="players"></div>

<div class="box">
<button onclick="stat('gol')" class="green">GOL</button>
<button onclick="stat('assist')" class="blue">ASSIST</button>
<button onclick="stat('errore')" class="red">ERRORE</button>
<button onclick="cambio()">CAMBIO</button>
</div>

<div class="box" id="stats"></div>

<div class="box"><canvas id="chart"></canvas></div>

<div class="box">
<button onclick="pdf()">PDF</button>
</div>

<script>

let players=[],current=0,sec=0,int,periodo=1,chart;

// INIT
function init(){
    for(let i=0;i<15;i++){
        players.push({nome:"G"+(i+1),gol:0,assist:0,errore:0});
    }
    draw();
}

// TIMER
function start(){int=setInterval(()=>{sec++;update();},1000);}
function stop(){clearInterval(int);}
function reset(){sec=0;update();}
function update(){
    let m=String(Math.floor(sec/60)).padStart(2,'0');
    let s=String(sec%60).padStart(2,'0');
    document.getElementById("tempo").innerText=m+":"+s;
}

function nextPeriodo(){
    periodo++;
    document.getElementById("periodo").innerText=periodo;
}

// PLAYERS
function draw(){
    let h="";
    players.forEach((p,i)=>{
        h+=`<div class="player ${i==current?'selected':''}" onclick="sel(${i})">${p.nome}</div>`;
    });
    document.getElementById("players").innerHTML=h;
    stats();
    chartDraw();
}

function sel(i){current=i;draw();}

// STATS
function stat(t){
    players[current][t]++;
    draw();
}

function score(p){
    return p.gol*3+p.assist*2-p.errore*2;
}

function stats(){
    let h="";
    players.forEach(p=>{
        h+=`${p.nome} ⭐ ${score(p)}<br>`;
    });
    document.getElementById("stats").innerHTML=h;
}

// CAMBIO
function cambio(){
    alert("Cambio giocatore manuale");
}

// CHART
function chartDraw(){
    let l=players.map(p=>p.nome);
    let d=players.map(p=>score(p));
    if(chart) chart.destroy();
    chart=new Chart(document.getElementById("chart"),{
        type:"bar",
        data:{labels:l,datasets:[{data:d}]}
    });
}

// SAVE
function salva(){
    localStorage.setItem("team",JSON.stringify(players));
}

// PDF
function pdf(){
    const { jsPDF } = window.jspdf;
    let doc=new jsPDF();
    let y=10;

    doc.text("REPORT PARTITA",10,y); y+=10;

    players.forEach(p=>{
        doc.text(p.nome+" "+score(p),10,y);
        y+=6;
    });

    doc.save("report.pdf");
}

// START
init();

</script>

</body>
</html>
