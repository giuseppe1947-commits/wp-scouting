<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WP ELITE SCOUTING PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {font-family: Arial; background:#0f172a; color:white; text-align:center;}
input {padding:8px;margin:3px;width:28%;border-radius:8px;border:none;}
button {padding:10px;margin:5px;border-radius:10px;border:none;font-weight:bold;}
.player {background:#1e293b;margin:5px;padding:8px;border-radius:8px;cursor:pointer;}
.selected {background:#2ecc71;}
.box {background:#1e293b;padding:10px;margin:10px;border-radius:10px;}
.green{background:#2ecc71;} .red{background:#e74c3c;} .blue{background:#3498db;}
</style>
</head>

<body>

<h2>🏊 WP ELITE SCOUTING PRO</h2>

<div class="box">
<input id="teamName" placeholder="Nome squadra">
<input id="coachName" placeholder="Allenatore">
<button onclick="salvaSquadra()">💾 Salva Squadra</button>
<select id="teamSelect" onchange="caricaSquadra()"></select>
</div>

<div class="box">
<h3>⏱ Cronometro</h3>
<div id="timer">00:00</div>
<button onclick="startTimer()">START</button>
<button onclick="stopTimer()">STOP</button>
<button onclick="resetTimer()">RESET</button>
</div>

<div class="box">
<h3>👥 Giocatori (15)</h3>
<div id="inputs"></div>
<button onclick="salvaNomi()">Salva Nomi</button>
</div>

<div class="box" id="players"></div>

<div class="box">
<button onclick="addStat('gol')" class="green">GOL</button>
<button onclick="addStat('assist')" class="blue">ASSIST</button>
<button onclick="addStat('rec')">RECUPERO</button>
<button onclick="addStat('persa')" class="red">PERSA</button>
<button onclick="addStat('fallo')" class="red">FALLO</button>
</div>

<div class="box" id="stats"></div>

<div class="box"><h3>🏆 MVP</h3><div id="best"></div></div>

<div class="box"><canvas id="chart"></canvas></div>

<script>

let players=[], current=0, currentTeam="default", seconds=0, interval, chart;

// INIT
function init(){
    players=[];
    for(let i=0;i<15;i++){
        players.push({
            nome:"Giocatore "+(i+1),
            gol:0,
            assist:0,
            rec:0,
            persa:0,
            fallo:0
        });
    }
    drawAll();
}

// TIMER
function startTimer(){interval=setInterval(()=>{seconds++;updateTimer();},1000);}
function stopTimer(){clearInterval(interval);}
function resetTimer(){seconds=0;updateTimer();}
function updateTimer(){
    let m=String(Math.floor(seconds/60)).padStart(2,'0');
    let s=String(seconds%60).padStart(2,'0');
    document.getElementById("timer").innerText=m+":"+s;
}

// TEAM
function salvaSquadra(){
    let nome=document.getElementById("teamName").value;
    let coach=document.getElementById("coachName").value;

    if(!nome)return alert("Inserisci nome squadra");

    localStorage.setItem("team_"+nome,JSON.stringify({
        players:players,
        coach:coach
    }));

    aggiornaLista();
}

function aggiornaLista(){
    let s=document.getElementById("teamSelect");
    s.innerHTML="";
    for(let k in localStorage){
        if(k.startsWith("team_")){
            let n=k.replace("team_","");
            s.innerHTML+=`<option>${n}</option>`;
        }
    }
}

function caricaSquadra(){
    let n=document.getElementById("teamSelect").value;
    currentTeam=n;

    let data=JSON.parse(localStorage.getItem("team_"+n));
    if(data){
        players=data.players;
        document.getElementById("coachName").value=data.coach || "";
    }

    drawAll();
}

// INPUT NOMI
function drawInputs(){
    let h="";
    players.forEach((p,i)=>{
        h+=`<input id="p${i}" value="${p.nome}">`;
    });
    document.getElementById("inputs").innerHTML=h;
}

function salvaNomi(){
    players.forEach((p,i)=>{
        p.nome=document.getElementById("p"+i).value;
    });
    saveTeam();
    drawPlayers();
}

// PLAYERS
function drawPlayers(){
    let h="";
    players.forEach((p,i)=>{
        h+=`<div class="player ${i===current?'selected':''}" onclick="selectPlayer(${i})">${p.nome}</div>`;
    });
    document.getElementById("players").innerHTML=h;
}

function selectPlayer(i){
    current=i;
    drawPlayers();
}

// SCORE
function score(p){
    return (p.gol*3 + p.assist*2 + p.rec*2) - (p.persa*2 + p.fallo*3);
}

// ACTION
function addStat(tipo){
    players[current][tipo]++;
    saveTeam();
    drawStats();
    best();
    chartDraw();
}

// STATS
function drawStats(){
    let h="";
    players.forEach(p=>{
        h+=`<div>${p.nome} ⭐ ${score(p)}</div>`;
    });
    document.getElementById("stats").innerHTML=h;
}

// MVP
function best(){
    let b=players.reduce((a,b)=>score(a)>score(b)?a:b);
    document.getElementById("best").innerText=b.nome+" ("+score(b)+")";
}

// SAVE TEAM
function saveTeam(){
    localStorage.setItem("team_"+currentTeam,JSON.stringify({
        players:players,
        coach:document.getElementById("coachName").value
    }));
}

// CHART
function chartDraw(){
    let labels=players.map(p=>p.nome);
    let data=players.map(p=>score(p));
    if(chart) chart.destroy();
    chart=new Chart(document.getElementById("chart"),{
        type:"bar",
        data:{labels:labels,datasets:[{data:data}]}
    });
}

// DRAW
function drawAll(){
    drawInputs();
    drawPlayers();
    drawStats();
    chartDraw();
    aggiornaLista();
}

// START
init();

</script>

</body>
</html>
