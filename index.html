<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>WP COACH PRO ELITE</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {background:#0f172a;color:white;font-family:Arial;text-align:center;}
.box {background:#1e293b;margin:10px;padding:10px;border-radius:10px;}
.player {padding:8px;margin:4px;background:#334155;border-radius:6px;cursor:pointer;}
.selected {background:#22c55e;}
button {margin:5px;padding:8px;border-radius:8px;border:none;}
input {margin:3px;padding:5px;}
</style>
</head>

<body>

<h2>🏊 WP COACH PRO ELITE</h2>

<div class="box">
<input id="team" placeholder="Squadra">
<input id="coach" placeholder="Allenatore">
<input id="avv" placeholder="Avversario">
</div>

<div class="box">
<h3 id="score">0 - 0</h3>
<button onclick="goalUs()">+ NOI</button>
<button onclick="goalThem()">+ AVV</button>
</div>

<div class="box">
<h3 id="time">00:00</h3>
<button onclick="start()">START</button>
<button onclick="stop()">STOP</button>
<button onclick="reset()">RESET</button>
</div>

<div class="box">
<button onclick="sprint('NOI')">Sprint NOI</button>
<button onclick="sprint('AVV')">Sprint AVV</button>
<div id="sprint"></div>
</div>

<div class="box">
<div id="inputs"></div>
<button onclick="saveNames()">Salva nomi</button>
</div>

<div id="players"></div>

<div class="box">
<button onclick="stat('gol')">GOL</button>
<button onclick="stat('assist')">ASSIST</button>
<button onclick="stat('espFatta')">ESP FATTA</button>
<button onclick="stat('espSubita')">ESP SUBITA</button>
<button onclick="stat('err')">ERRORE</button>
</div>

<div id="stats"></div>

<div class="box">
<button onclick="saveMatch()">💾 Salva</button>
<button onclick="downloadPDF()">📄 PDF</button>
</div>

<div class="box">
<h3>📊 Storico</h3>
<div id="storico"></div>
</div>

<div class="box">
<h3>📈 Analisi Squadra</h3>
<div id="classifica"></div>
<div id="topPlayer"></div>
<button onclick="aggiornaAnalisi()">Aggiorna Statistiche</button>
</div>

<script>
let players=[],cur=0,sec=0,int,us=0,them=0;
let log=[],sprintWinner="",editIndex=null;

// INIT
function init(){
    players=[];
    for(let i=0;i<15;i++){
        players.push({nome:"G"+(i+1),gol:0,assist:0,espFatta:0,espSubita:0,err:0});
    }
    draw();
    loadStorico();
    aggiornaAnalisi();
}

// TIMER
function start(){int=setInterval(()=>{sec++;update();},1000);}
function stop(){clearInterval(int);}
function reset(){sec=0;update();}
function update(){
    let m=Math.floor(sec/60).toString().padStart(2,'0');
    let s=(sec%60).toString().padStart(2,'0');
    document.getElementById("time").innerText=m+":"+s;
}

// SCORE
function goalUs(){us++;updateScore();}
function goalThem(){them++;updateScore();}
function updateScore(){
    document.getElementById("score").innerText=us+" - "+them;
}

// SPRINT
function sprint(v){
    sprintWinner=v;
    document.getElementById("sprint").innerText="Sprint: "+v;
}

// INPUT
function drawInputs(){
    let h="";
    players.forEach((p,i)=>{
        h+=`<input id="p${i}" value="${p.nome}">`;
    });
    document.getElementById("inputs").innerHTML=h;
}

function saveNames(){
    players.forEach((p,i)=>{
        p.nome=document.getElementById("p"+i).value;
    });
    draw();
}

// PLAYERS
function draw(){
    drawInputs();
    let h="";
    players.forEach((p,i)=>{
        h+=`<div class="player ${i==cur?'selected':''}" onclick="sel(${i})">${p.nome}</div>`;
    });
    document.getElementById("players").innerHTML=h;
    stats();
}

function sel(i){cur=i;draw();}

// STATS
function stat(t){
    players[cur][t]++;
    log.push(players[cur].nome+" "+t+" min "+sec);
    draw();
}

function score(p){
    return p.gol*3+p.assist*2+p.espFatta*2-p.espSubita-p.err*2;
}

function stats(){
    let h="";
    players.forEach(p=>{
        h+=p.nome+" ⭐ "+score(p)+"<br>";
    });
    document.getElementById("stats").innerHTML=h;
}

// SAVE MATCH
function saveMatch(){
    let m={
        data:new Date().toLocaleString(),
        squadra:team.value,
        coach:coach.value,
        avversario:avv.value,
        risultato:us+"-"+them,
        players:players,
        log:log,
        sprint:sprintWinner
    };

    let storico=JSON.parse(localStorage.getItem("storico"))||[];

    if(editIndex!==null){
        storico[editIndex]=m;
        editIndex=null;
    }else{
        storico.push(m);
    }

    localStorage.setItem("storico",JSON.stringify(storico));
    alert("Salvato!");
    loadStorico();
    aggiornaAnalisi();
}

// STORICO
function loadStorico(){
    let storico=JSON.parse(localStorage.getItem("storico"))||[];
    let h="";

    storico.forEach((m,i)=>{
        h+=`
        <div style="border:1px solid white;margin:5px;padding:10px;">
        📅 ${m.data}<br>
        ${m.squadra} vs ${m.avversario}<br>
        ${m.risultato}<br>
        <button onclick="openMatch(${i})">Apri</button>
        <button onclick="editMatch(${i})">Modifica</button>
        <button onclick="deleteMatch(${i})">Elimina</button>
        </div>`;
    });

    document.getElementById("storico").innerHTML=h;
}

// OPEN
function openMatch(i){
    let storico=JSON.parse(localStorage.getItem("storico"));
    let m=storico[i];

    team.value=m.squadra;
    coach.value=m.coach;
    avv.value=m.avversario;

    let r=m.risultato.split("-");
    us=parseInt(r[0]); them=parseInt(r[1]);
    updateScore();

    players=m.players;
    log=m.log||[];
    sprintWinner=m.sprint||"";

    draw();
}

// EDIT
function editMatch(i){
    editIndex=i;
    openMatch(i);
}

// DELETE
function deleteMatch(i){
    let storico=JSON.parse(localStorage.getItem("storico"));
    storico.splice(i,1);
    localStorage.setItem("storico",JSON.stringify(storico));
    loadStorico();
    aggiornaAnalisi();
}

// PDF
function downloadPDF(){
    const { jsPDF } = window.jspdf;
    let doc=new jsPDF();
    let y=10;

    doc.text("REPORT PARTITA",10,y); y+=10;
    doc.text(team.value+" vs "+avv.value,10,y); y+=10;
    doc.text("Allenatore: "+coach.value,10,y); y+=10;
    doc.text("Risultato "+us+"-"+them,10,y); y+=10;

    players.forEach(p=>{
        doc.text(p.nome+" G:"+p.gol+" A:"+p.assist,10,y);
        y+=6;
    });

    doc.save("report.pdf");
}

// CLASSIFICA
function classifica(){
    let storico=JSON.parse(localStorage.getItem("storico"))||[];

    let punti=0,v=0,p=0,s=0,fatti=0,subiti=0;

    storico.forEach(m=>{
        let r=m.risultato.split("-");
        let us=parseInt(r[0]);
        let avv=parseInt(r[1]);

        fatti+=us;
        subiti+=avv;

        if(us>avv){punti+=3;v++;}
        else if(us==avv){punti+=1;p++;}
        else{s++;}
    });

    document.getElementById("classifica").innerHTML=
    `🏆 ${punti} punti<br>Vittorie ${v}<br>Pareggi ${p}<br>Sconfitte ${s}<br>GF ${fatti} GS ${subiti}`;
}

// MIGLIOR GIOCATORE
function migliorGiocatore(){
    let storico=JSON.parse(localStorage.getItem("storico"))||[];
    let tot={};

    storico.forEach(m=>{
        m.players.forEach(p=>{
            if(!tot[p.nome]) tot[p.nome]={pt:0};
            tot[p.nome].pt+=p.gol*3+p.assist*2;
        });
    });

    let best="",max=0;
    for(let n in tot){
        if(tot[n].pt>max){max=tot[n].pt;best=n;}
    }

    document.getElementById("topPlayer").innerHTML=
    "🥇 "+best+" ("+max+" pt)";
}

function aggiornaAnalisi(){
    classifica();
    migliorGiocatore();
}

// START
init();

</script>

</body>
</html>
