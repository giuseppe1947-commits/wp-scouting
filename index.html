<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WP COACH PRO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {font-family: Arial; background:#0f172a; color:white; text-align:center;}
button {padding:12px;margin:5px;border-radius:10px;border:none;font-size:16px;}
.player {padding:10px;margin:5px;border-radius:8px;background:#1e293b;}
.selected {background:#2ecc71;}
.box {background:#1e293b;padding:10px;margin:10px;border-radius:10px;}
input {margin:3px;padding:8px;border-radius:5px;border:none;}
</style>
</head>

<body>

<h2>🏊 WP COACH PRO</h2>

<div class="box">
<input id="team" placeholder="Nome squadra">
<input id="coach" placeholder="Allenatore">
<input id="avv" placeholder="Avversario">
</div>

<div class="box">
<h3>🏁 Punteggio</h3>
<h1 id="score">0 - 0</h1>
<button onclick="goalUs()">+ NOI</button>
<button onclick="goalThem()">+ AVV</button>
</div>

<div class="box">
<h3>⏱ <span id="time">00:00</span></h3>
<button onclick="start()">START</button>
<button onclick="stop()">STOP</button>
<button onclick="reset()">RESET</button>
</div>

<div class="box">
<h3>✍️ Nomi giocatori</h3>
<div id="inputs"></div>
<button onclick="saveNames()">Salva nomi</button>
</div>

<div class="box" id="players"></div>

<div class="box">
<button onclick="stat('gol')">⚽ GOL</button>
<button onclick="stat('assist')">🎯 ASSIST</button>
<button onclick="stat('err')">❌ ERRORE</button>
</div>

<div class="box" id="stats"></div>

<div class="box">
<button onclick="saveMatch()">💾 Salva Partita</button>
<button onclick="downloadPDF()">📄 PDF</button>
</div>

<script>

let players=[],cur=0,sec=0,int,us=0,them=0;
let matchLog=[];

// INIT
function init(){
    for(let i=0;i<15;i++){
        players.push({nome:"Giocatore "+(i+1),gol:0,assist:0,err:0});
    }
    draw();
}

// TIMER
function start(){int=setInterval(()=>{sec++;update();},1000);}
function stop(){clearInterval(int);}
function reset(){sec=0;update();}
function update(){
    let m=String(Math.floor(sec/60)).padStart(2,'0');
    let s=String(sec%60).padStart(2,'0');
    document.getElementById("time").innerText=m+":"+s;
}

// SCORE
function goalUs(){us++;updateScore();}
function goalThem(){them++;updateScore();}
function updateScore(){
    document.getElementById("score").innerText=us+" - "+them;
}

// INPUT NOMI
function drawInputs(){
    let h="";
    players.forEach((p,i)=>{
        h+=`<input id="p${i}" value="${p.nome}" style="width:30%;">`;
    });
    document.getElementById("inputs").innerHTML=h;
}

function saveNames(){
    players.forEach((p,i)=>{
        p.nome=document.getElementById("p"+i).value;
    });
    draw();
}

// GIOCATORI
function draw(){
    drawInputs();
    let h="";
    players.forEach((p,i)=>{
        h+=`<div class="player ${i==cur?'selected':''}" onclick="sel(${i})">${p.nome}</div>`;
    });
    document.getElementById("players").innerHTML=h;
    stats();
}

function sel(i){cur=i;draw();}

// STAT
function stat(t){
    players[cur][t]++;
    matchLog.push(players[cur].nome+" "+t+" al minuto "+sec);
    draw();
}

function score(p){
    return p.gol*3+p.assist*2-p.err*2;
}

function stats(){
    let h="";
    players.forEach(p=>{
        h+=`${p.nome} ⭐ ${score(p)}<br>`;
    });
    document.getElementById("stats").innerHTML=h;
}

// SALVA PARTITA
function saveMatch(){
    alert("Partita salvata!");
}

// PDF
function downloadPDF(){
    const { jsPDF } = window.jspdf;
    let doc=new jsPDF();

    let y=10;

    doc.text("REPORT PARTITA",10,y); y+=10;

    doc.text("Squadra: "+document.getElementById("team").value,10,y); y+=8;
    doc.text("Allenatore: "+document.getElementById("coach").value,10,y); y+=8;
    doc.text("Avversario: "+document.getElementById("avv").value,10,y); y+=8;

    doc.text("Risultato: "+us+"-"+them,10,y); y+=10;

    doc.text("Statistiche:",10,y); y+=8;

    players.forEach(p=>{
        doc.text(p.nome+" G:"+p.gol+" A:"+p.assist+" E:"+p.err,10,y);
        y+=6;
    });

    y+=5;
    doc.text("Eventi partita:",10,y); y+=8;

    matchLog.forEach(e=>{
        doc.text("- "+e,10,y);
        y+=6;
    });

    doc.save("report_partita.pdf");
}

// START
init();

</script>

</body>
</html>
