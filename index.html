<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>WP COACH PRO ELITE</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {background:#0f172a;color:white;font-family:Arial;text-align:center;}
.box {background:#1e293b;margin:10px;padding:10px;border-radius:10px;}
.player {padding:8px;margin:4px;background:#334155;border-radius:6px;cursor:pointer;}
.selected {background:#22c55e;}
button {margin:5px;padding:10px;border-radius:8px;border:none;}
.active {background:#22c55e;}
input {margin:3px;padding:5px;}
</style>
</head>

<body>

<h2>🏊 WP COACH PRO ELITE</h2>

<div class="box">
<input id="team" placeholder="Squadra">
<input id="coach" placeholder="Allenatore">
<input id="avv" placeholder="Avversario">
</div>

<div class="box">
<h3 id="score">0 - 0</h3>
<button onclick="goalUs(this)">+ NOI</button>
<button onclick="goalThem(this)">+ AVV</button>
</div>

<div class="box">
<h3 id="time">00:00</h3>
<button onclick="start()">START</button>
<button onclick="stop()">STOP</button>
<button onclick="reset()">RESET</button>
</div>

<div class="box">
<button onclick="sprint('NOI')">Sprint NOI</button>
<button onclick="sprint('AVV')">Sprint AVV</button>
<div id="sprint"></div>
</div>

<div class="box">
<h3>🧤 Portiere (n°1)</h3>
<input id="portiere" placeholder="Nome portiere">
<button onclick="rigoreParato(this)">Rigore Parato</button>
<div id="rigori"></div>
</div>

<div class="box">
<div id="inputs"></div>
<button onclick="saveNames()">Salva nomi</button>
</div>

<div id="players"></div>

<div class="box">
<button onclick="stat('gol',this)">GOL</button>
<button onclick="stat('assist',this)">ASSIST</button>
<button onclick="stat('espFatta',this)">ESP FATTA</button>
<button onclick="stat('espSubita',this)">ESP SUBITA</button>
<button onclick="stat('err',this)">ERRORE</button>
<button onclick="undo()">↩️ ANNULLA</button>
</div>

<div id="stats"></div>

<script>

let players=[],cur=0,sec=0,int=null,us=0,them=0;
let log=[],sprintWinner="",rigori=0;

// INIT
function init(){
    for(let i=0;i<15;i++){
        players.push({nome:"G"+(i+1),gol:0,assist:0,espFatta:0,espSubita:0,err:0});
    }
    draw();
}

// TIMER
function start(){
    if(int) return;
    int=setInterval(()=>{sec++;update();},1000);
}

function stop(){
    clearInterval(int);
    int=null;
}

function reset(){
    stop();
    sec=0;
    update();
}

function update(){
    let m=Math.floor(sec/60).toString().padStart(2,'0');
    let s=(sec%60).toString().padStart(2,'0');
    document.getElementById("time").innerText=m+":"+s;
}

// SCORE
function goalUs(btn){
    us++;updateScore();
    flash(btn);
}

function goalThem(btn){
    them++;updateScore();
    flash(btn);
}

function updateScore(){
    document.getElementById("score").innerText=us+" - "+them;
}

// SPRINT
function sprint(v){
    sprintWinner=v;
    document.getElementById("sprint").innerText="Sprint: "+v;
}

// PORTIERE
function rigoreParato(btn){
    rigori++;
    document.getElementById("rigori").innerText="Rigori parati: "+rigori;
    log.push("Rigore parato");
    flash(btn);
}

// INPUT
function drawInputs(){
    let h="";
    players.forEach((p,i)=>{
        h+=`<input id="p${i}" value="${p.nome}">`;
    });
    document.getElementById("inputs").innerHTML=h;
}

function saveNames(){
    players.forEach((p,i)=>{
        p.nome=document.getElementById("p"+i).value;
    });
    draw();
}

// PLAYERS
function draw(){
    drawInputs();
    let h="";
    players.forEach((p,i)=>{
        h+=`<div class="player ${i==cur?'selected':''}" onclick="sel(${i})">${p.nome}</div>`;
    });
    document.getElementById("players").innerHTML=h;
    stats();
}

function sel(i){cur=i;draw();}

// STATS
function stat(t,btn){
    players[cur][t]++;
    log.push(players[cur].nome+" "+t+" min "+sec);
    flash(btn);
    draw();
}

// ANNULLA
function undo(){
    if(log.length===0) return;
    log.pop();
    alert("Ultima azione annullata (statistiche manuali)");
}

// EVIDENZIA PULSANTE
function flash(btn){
    btn.classList.add("active");
    setTimeout(()=>btn.classList.remove("active"),300);
}

function score(p){
    return p.gol*3+p.assist*2+p.espFatta*2-p.espSubita-p.err*2;
}

function stats(){
    let h="";
    players.forEach(p=>{
        h+=p.nome+" ⭐ "+score(p)+"<br>";
    });
    document.getElementById("stats").innerHTML=h;
}

// START
init();

</script>

</body>
</html>
