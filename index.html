<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WP COACH PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {font-family: Arial; background:#0f172a; color:white; text-align:center;}
button {padding:15px;margin:5px;border-radius:10px;border:none;font-size:18px;}
.player {padding:10px;margin:5px;border-radius:8px;background:#1e293b;}
.selected {background:#2ecc71;}
.box {background:#1e293b;padding:10px;margin:10px;border-radius:10px;}
.green{background:#2ecc71;} .red{background:#e74c3c;} .blue{background:#3498db;}
</style>
</head>

<body>

<h2>🏊 WP COACH PRO</h2>

<div class="box">
<input id="team" placeholder="Squadra">
<input id="coach" placeholder="Allenatore">
<input id="avv" placeholder="Avversario">
</div>

<div class="box">
<h3>🏁 Punteggio</h3>
<h1 id="score">0 - 0</h1>
<button onclick="goalUs()">+ NOI</button>
<button onclick="goalThem()">+ AVV</button>
</div>

<div class="box">
<h3>⏱ <span id="time">00:00</span> | Tempo <span id="period">1</span></h3>
<button onclick="start()">START</button>
<button onclick="stop()">STOP</button>
<button onclick="reset()">RESET</button>
<button onclick="next()">NEXT</button>
</div>

<div class="box" id="players"></div>

<div class="box">
<button onclick="stat('gol')" class="green">GOL</button>
<button onclick="stat('assist')" class="blue">ASSIST</button>
<button onclick="stat('err')" class="red">ERRORE</button>
</div>

<div class="box" id="stats"></div>

<div class="box"><canvas id="chart"></canvas></div>

<div class="box"><button onclick="pdf()">PDF REPORT</button></div>

<script>

let players=[],cur=0,sec=0,int,period=1,us=0,them=0,chart;

function init(){
    for(let i=0;i<15;i++){
        players.push({nome:"G"+(i+1),gol:0,assist:0,err:0});
    }
    draw();
}

// TIMER
function start(){int=setInterval(()=>{sec++;update();},1000);}
function stop(){clearInterval(int);}
function reset(){sec=0;update();}
function update(){
    let m=String(Math.floor(sec/60)).padStart(2,'0');
    let s=String(sec%60).padStart(2,'0');
    document.getElementById("time").innerText=m+":"+s;
}
function next(){period++;document.getElementById("period").innerText=period;}

// SCORE
function goalUs(){us++;updateScore();}
function goalThem(){them++;updateScore();}
function updateScore(){
    document.getElementById("score").innerText=us+" - "+them;
}

// PLAYERS
function draw(){
    let h="";
    players.forEach((p,i)=>{
        h+=`<div class="player ${i==cur?'selected':''}" onclick="sel(${i})">${p.nome}</div>`;
    });
    document.getElementById("players").innerHTML=h;
    stats();
    chartDraw();
}

function sel(i){cur=i;draw();}

// STATS
function stat(t){
    players[cur][t]++;
    draw();
}

function score(p){
    return p.gol*3+p.assist*2-p.err*2;
}

function stats(){
    let h="";
    players.forEach(p=>{
        h+=`${p.nome} ⭐ ${score(p)}<br>`;
    });
    document.getElementById("stats").innerHTML=h;
}

// CHART
function chartDraw(){
    let l=players.map(p=>p.nome);
    let d=players.map(p=>score(p));
    if(chart) chart.destroy();
    chart=new Chart(document.getElementById("chart"),{
        type:"bar",
        data:{labels:l,datasets:[{data:d}]}
    });
}

// PDF
function pdf(){
    const { jsPDF } = window.jspdf;
    let doc=new jsPDF();
    let y=10;

    doc.text("REPORT PARTITA",10,y); y+=10;
    doc.text("Score: "+us+"-"+them,10,y); y+=10;

    players.forEach(p=>{
        doc.text(p.nome+" "+score(p),10,y);
        y+=6;
    });

    doc.save("report.pdf");
}

// START
init();

</script>

</body>
</html>
