<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WP COACH PRO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {font-family: Arial; background:#0f172a; color:white; text-align:center;}
button {padding:10px;margin:5px;border-radius:10px;border:none;}
.player {padding:10px;margin:5px;background:#1e293b;border-radius:8px;}
.selected {background:#2ecc71;}
.box {background:#1e293b;margin:10px;padding:10px;border-radius:10px;}
input {margin:3px;padding:6px;}
</style>
</head>

<body>

<h2>🏊 WP COACH PRO</h2>

<div class="box">
<input id="team" placeholder="Squadra">
<input id="coach" placeholder="Allenatore">
<input id="avv" placeholder="Avversario">
</div>

<div class="box">
<h3 id="score">0 - 0</h3>
<button onclick="goalUs()">+ NOI</button>
<button onclick="goalThem()">+ AVV</button>
</div>

<div class="box">
<h3 id="time">00:00</h3>
<button onclick="start()">START</button>
<button onclick="stop()">STOP</button>
<button onclick="reset()">RESET</button>
</div>

<div class="box">
<button onclick="sprint('noi')">Sprint NOI</button>
<button onclick="sprint('loro')">Sprint AVV</button>
<div id="sprint"></div>
</div>

<div class="box">
<div id="inputs"></div>
<button onclick="saveNames()">Salva nomi</button>
</div>

<div id="players"></div>

<div class="box">
<button onclick="stat('gol')">GOL</button>
<button onclick="stat('assist')">ASSIST</button>
<button onclick="stat('espFatta')">ESP FATTA</button>
<button onclick="stat('espSubita')">ESP SUBITA</button>
<button onclick="stat('err')">ERRORE</button>
</div>

<div id="stats"></div>

<div class="box">
<button onclick="saveMatch()">💾 Salva Partita</button>
<button onclick="downloadPDF()">📄 PDF</button>
</div>

<div class="box">
<h3>📊 Storico</h3>
<div id="storico"></div>
</div>

<script>

let players=[],cur=0,sec=0,int,us=0,them=0;
let matchLog=[],sprintWinner="";

// INIT
function init(){
    for(let i=0;i<15;i++){
        players.push({nome:"G"+(i+1),gol:0,assist:0,espFatta:0,espSubita:0,err:0});
    }
    caricaStorico();
    draw();
}

// TIMER
function start(){int=setInterval(()=>{sec++;update();},1000);}
function stop(){clearInterval(int);}
function reset(){sec=0;update();}
function update(){
    let m=Math.floor(sec/60).toString().padStart(2,'0');
    let s=(sec%60).toString().padStart(2,'0');
    document.getElementById("time").innerText=m+":"+s;
}

// SCORE
function goalUs(){us++;updateScore();}
function goalThem(){them++;updateScore();}
function updateScore(){
    document.getElementById("score").innerText=us+" - "+them;
}

// SPRINT
function sprint(v){
    sprintWinner=v;
    document.getElementById("sprint").innerText="Sprint: "+v;
}

// INPUT
function drawInputs(){
    let h="";
    players.forEach((p,i)=>{
        h+=`<input id="p${i}" value="${p.nome}">`;
    });
    document.getElementById("inputs").innerHTML=h;
}

function saveNames(){
    players.forEach((p,i)=>{
        p.nome=document.getElementById("p"+i).value;
    });
    draw();
}

// PLAYERS
function draw(){
    drawInputs();
    let h="";
    players.forEach((p,i)=>{
        h+=`<div class="player ${i==cur?'selected':''}" onclick="sel(${i})">${p.nome}</div>`;
    });
    document.getElementById("players").innerHTML=h;
    stats();
}

function sel(i){cur=i;draw();}

// STATS
function stat(t){
    players[cur][t]++;
    matchLog.push(players[cur].nome+" "+t+" min "+sec);
    draw();
}

function score(p){
    return p.gol*3+p.assist*2+p.espFatta*2-p.espSubita-p.err*2;
}

function stats(){
    let h="";
    players.forEach(p=>{
        h+=p.nome+" ⭐ "+score(p)+"<br>";
    });
    document.getElementById("stats").innerHTML=h;
}

// SALVA PARTITA
function saveMatch(){
    let match={
        data:new Date().toLocaleString(),
        squadra:team.value,
        coach:coach.value,
        avversario:avv.value,
        risultato:us+"-"+them,
        players:players,
        eventi:matchLog,
        sprint:sprintWinner
    };

    let storico=JSON.parse(localStorage.getItem("storico"))||[];
    storico.push(match);

    localStorage.setItem("storico",JSON.stringify(storico));
    alert("Salvata!");
    caricaStorico();
}

// STORICO
function caricaStorico(){
    let storico=JSON.parse(localStorage.getItem("storico"))||[];
    let h="";
    storico.forEach((m,i)=>{
        h+=`<div onclick="loadMatch(${i})" style="border:1px solid white;margin:5px;padding:5px;">
        ${m.data}<br>${m.squadra} vs ${m.avversario}<br>${m.risultato}
        </div>`;
    });
    document.getElementById("storico").innerHTML=h;
}

// APRI PARTITA
function loadMatch(i){
    let storico=JSON.parse(localStorage.getItem("storico"))||[];
    let m=storico[i];

    team.value=m.squadra;
    coach.value=m.coach;
    avv.value=m.avversario;

    let r=m.risultato.split("-");
    us=parseInt(r[0]); them=parseInt(r[1]);
    updateScore();

    players=m.players;
    matchLog=m.eventi;
    sprintWinner=m.sprint;

    draw();
}

// PDF
function downloadPDF(){
    const { jsPDF } = window.jspdf;
    let doc=new jsPDF();
    let y=10;

    doc.text("REPORT",10,y); y+=10;
    doc.text("Score "+us+"-"+them,10,y); y+=10;

    players.forEach(p=>{
        doc.text(p.nome+" G:"+p.gol+" A:"+p.assist,10,y);
        y+=6;
    });

    doc.save("report.pdf");
}

// START
init();

</script>

</body>
</html>
